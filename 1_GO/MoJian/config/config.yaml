server:
  port: 8080
  mode: debug  # debug / release / test

database:
  host: 127.0.0.1
  port: 15432
  user: postgres
  password: postgres
  dbname: blog
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 100

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "your-secret-key-change-in-production"
  expire: 24  # 小时

log:
  level: debug    # debug / info / warn / error
  filename: "logs/mojian.log"
  max_size: 200   # MB
  max_backups: 7
  max_age: 30     # 天

blog:
  guest_comment_limit: 5  # 游客最多可查看的评论条数
